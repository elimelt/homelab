tls:
  certificates:
    - certFile: /certs/blink.tail8ab50a.ts.net.crt
      keyFile: /certs/blink.tail8ab50a.ts.net.key
    - certFile: /certs/cert.pem
      keyFile: /certs/key.pem
  stores:
    default:
      defaultCertificate:
        certFile: /certs/blink.tail8ab50a.ts.net.crt
        keyFile: /certs/blink.tail8ab50a.ts.net.key

http:
  routers:
    terminal:
      rule: "PathPrefix(`/terminal`)"
      entryPoints:
        - websecure
      service: terminal
      tls: {}
      middlewares:
        - auth
        - terminal-strip
      priority: 10
    terminal-stream:
      rule: "Path(`/stream`)"
      entryPoints:
        - websecure
      service: terminal
      tls: {}
      middlewares:
        - auth
      priority: 15
    terminal-input:
      rule: "Path(`/input`)"
      entryPoints:
        - websecure
      service: terminal
      tls: {}
      middlewares:
        - auth
      priority: 15

  services:
    terminal:
      loadBalancer:
        servers:
          - url: "http://172.18.0.1:8000"

  middlewares:
    auth:
      basicAuth:
        users:
          # Uses same credentials as docker labels - managed via BASIC_AUTH_USERS env var
          # This is a placeholder; actual users should be set in docker-compose labels
          - "admin:$$apr1$$placeholder"
        removeHeader: true
    terminal-strip:
      stripPrefix:
        prefixes:
          - "/terminal"

metrics:
  prometheus:
    buckets:
      - 0.1
      - 0.3
      - 1.2
      - 5.0
